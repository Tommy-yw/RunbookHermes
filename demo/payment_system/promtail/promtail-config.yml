server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: runbook-payment-demo
    static_configs:
      - targets: [localhost]
        labels:
          job: payment-demo
          service: payment-service
          __path__: /var/log/runbook/payment-service.log
      - targets: [localhost]
        labels:
          job: payment-demo
          service: order-service
          __path__: /var/log/runbook/order-service.log
      - targets: [localhost]
        labels:
          job: payment-demo
          service: coupon-service
          __path__: /var/log/runbook/coupon-service.log
